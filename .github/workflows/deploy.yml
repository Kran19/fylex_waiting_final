name: Deploy Fylex Waitlist

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e  # Exit immediately on any error
            echo "========================================="
            echo "🚀 Starting Fylex Waitlist Deployment..."
            echo "========================================="

            # Remove old waitlist folder if it exists
            if [ -d "/home/waitlist" ]; then
              echo "🗑️ Removing old waitlist folder..."
              rm -rf /home/waitlist
            fi
            
            # Navigate to the new waitlist directory
            # Make sure you have cloned your waitlist repo into /home/fylex-waitlist-final on the server!
            if [ ! -d "/home/fylex-waitlist-final" ]; then
              echo "⚠️ Waitlist directory /home/fylex-waitlist-final does not exist!"
              echo "Please SSH into the server and run: git clone <your-waitlist-repo-url> /home/fylex-waitlist-final"
              exit 1
            fi

            echo "📥 Pulling latest changes from the waitlist repo..."
            cd /home/fylex-waitlist-final
            git pull origin main

            echo "🎨 Deploying Waitlist..."
            
            echo "📦 Installing waitlist dependencies..."
            npm install --frozen-lockfile || npm install

            echo "🗄️  Generating Prisma Client & Running Migrations..."
            npx prisma generate
            npx prisma migrate deploy

            echo "🔨 Building waitlist..."
            npm run build

            echo "♻️  Restarting waitlist service on port 3002..."
            pm2 delete fylex-waitlist || true
            pm2 start node_modules/next/dist/bin/next --name "fylex-waitlist" -- start -p 3002

            # ── PERSIST PM2 STATE ──────────────────────────────────────────
            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "========================================="
            echo "✅ Waitlist Deployment successful on port 3002!"
            echo "========================================="
